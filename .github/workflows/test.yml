name: Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: holepunchto/actions/swift-base@v1
      - run: swift format lint --recursive --strict .
      - run: swift build
      - run: swift test
